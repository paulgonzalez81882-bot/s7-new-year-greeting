<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Новым Годом от S7!</title>
    <style>
        :root {
            --s7-green: #c4d600;
            --s7-dark: #333333;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .gift-box {
            width: 150px;
            height: 150px;
            background-color: var(--s7-green);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(196, 214, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            animation: float 3s ease-in-out infinite;
        }

        .gift-box::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background-color: #fff;
            opacity: 0.8;
        }
        
        .gift-box::after {
            content: '';
            position: absolute;
            height: 30px;
            width: 100%;
            background-color: #fff;
            opacity: 0.8;
        }

        .gift-box:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px rgba(196, 214, 0, 0.6);
        }

        .gift-box.opened {
            animation: popOpen 0.5s forwards;
            pointer-events: none;
        }

        .message-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 80vw;
            max-width: 400px;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            border: 2px solid var(--s7-green);
        }

        .message-card.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        h1 {
            color: var(--s7-green);
            font-size: 2.5em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: var(--s7-dark);
            font-size: 1.2em;
            line-height: 1.5;
        }

        .airplane {
            position: absolute;
            font-size: 4rem;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            color: var(--s7-green);
        }

        .airplane.fly {
            animation: flyPlane 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .instruction {
            margin-top: 40px;
            color: #888;
            font-size: 1.1em;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes popOpen {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes flyPlane {
            0% { transform: translate(-50%, 50px) rotate(-45deg) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(150px, -300px) rotate(-15deg) scale(1.5); opacity: 0; }
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            opacity: 0.6;
            animation: moveClouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        .c1 { width: 100px; height: 30px; top: 15%; left: -100px; animation-duration: 25s; }
        .c1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .c1::after { width: 40px; height: 40px; top: -15px; right: 15px; }

        .c2 { width: 150px; height: 45px; top: 75%; left: -150px; animation-duration: 35s; animation-delay: -10s; }
        .c2::before { width: 70px; height: 70px; top: -35px; left: 25px; }
        .c2::after { width: 60px; height: 60px; top: -25px; right: 20px; }

        @keyframes moveClouds {
            from { transform: translateX(-150px); }
            to { transform: translateX(110vw); }
        }
    </style>
</head>
<body>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>

    <div class="container">
        <div class="gift-box" id="gift" onclick="openGift()">
            <!-- Ribbon is created via pseudo-elements -->
        </div>
        <div class="instruction" id="instruction">Нажмите, чтобы открыть подарок</div>
    </div>

    <div class="message-card" id="message">
        <h1>С Новым Годом!</h1>
        <p>Дорогой друг!<br><br>S7 Airlines желает тебе сказочных полетов во сне и наяву. Пусть новый 2027 год принесет море открытий!</p>
    </div>

    <div class="airplane" id="plane">✈️</div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        function openGift() {
            const gift = document.getElementById('gift');
            const message = document.getElementById('message');
            const plane = document.getElementById('plane');
            const instruction = document.getElementById('instruction');

            gift.classList.add('opened');
            instruction.style.display = 'none';

            // Wait for box to disappear
            setTimeout(() => {
                plane.classList.add('fly');
                
                // Fire confetti! Using S7 colors
                var defaults = {
                    colors: ['#c4d600', '#ffffff', '#333333']
                };
                
                confetti(Object.assign({}, defaults, {
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 }
                }));

                // Show message
                setTimeout(() => {
                    message.classList.add('show');
                }, 300);

            }, 400);
        }
    </script>
</body>
</html>
