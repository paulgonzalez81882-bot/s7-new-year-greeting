<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Новым 2027 Годом от S7!</title>
    <style>
        :root {
            --s7-green: #c4d600;
            --s7-dark: #1a1a2e;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: var(--s7-dark);
            color: #fff;
        }
        
        #space-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Launch Button */
        .launch-btn {
            background: rgba(196, 214, 0, 0.1);
            border: 2px solid var(--s7-green);
            color: var(--s7-green);
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(196, 214, 0, 0.4), inset 0 0 20px rgba(196, 214, 0, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            animation: pulse 2s infinite;
        }

        .launch-btn:hover {
            background: var(--s7-green);
            color: var(--s7-dark);
            box-shadow: 0 0 40px rgba(196, 214, 0, 0.8);
            transform: scale(1.05);
        }

        .launch-btn.hide {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
            transition: all 0.5s ease;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(196, 214, 0, 0.4), inset 0 0 20px rgba(196, 214, 0, 0.2); }
            50% { box-shadow: 0 0 40px rgba(196, 214, 0, 0.8), inset 0 0 30px rgba(196, 214, 0, 0.4); }
            100% { box-shadow: 0 0 20px rgba(196, 214, 0, 0.4), inset 0 0 20px rgba(196, 214, 0, 0.2); }
        }

        /* Airplane */
        .airplane-wrapper {
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 150px;
            opacity: 0;
            z-index: 20;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        .airplane-wrapper svg {
            width: 100%;
            height: auto;
            fill: var(--s7-green);
        }

        .fly-animation {
            animation: majesticFly 3.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes majesticFly {
            0% { transform: translate(0, 0) rotate(45deg) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            60% { transform: translate(60vw, -50vh) rotate(35deg) scale(2.5); opacity: 1; }
            100% { transform: translate(120vw, -120vh) rotate(25deg) scale(4); opacity: 0; }
        }

        /* Glassmorphism Card */
        .message-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 85vw;
            max-width: 500px;
            opacity: 0;
            pointer-events: none;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-top: 1px solid rgba(255,255,255,0.5);
            border-left: 1px solid rgba(255,255,255,0.5);
            text-align: center;
        }

        .message-card.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        h1 {
            color: var(--s7-green);
            font-size: 2.8em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(196, 214, 0, 0.5);
        }

        p {
            color: #f0f0f0;
            font-size: 1.3em;
            line-height: 1.6;
            font-weight: 300;
        }
        
        .logo-text {
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div class="ui-layer">
        <div class="launch-btn" id="launchBtn" onclick="launchSequence()">Разрешить взлёт</div>
        
        <div class="message-card" id="message">
            <h1>С Новым Годом!</h1>
            <p>Дорогой друг!<br><br><span class="logo-text">S7 Airlines</span> желает тебе высоких достижений, сказочных путешествий и мягких посадок. Пусть новый 2027 год принесет море невероятных открытий!</p>
        </div>
    </div>

    <!-- Airplane -->
    <div class="airplane-wrapper" id="plane">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <g fill="var(--s7-green)">
                <!-- Fuselage -->
                <path d="M46,20 C46,2 54,2 54,20 L54,80 C54,98 46,98 46,80 Z"/>
                <!-- Left Wing -->
                <path d="M46,35 L5,55 L5,62 L46,50 Z"/>
                <!-- Right Wing -->
                <path d="M54,35 L95,55 L95,62 L54,50 Z"/>
                <!-- Left Engine -->
                <path d="M22,45 C22,42 27,42 27,45 L27,53 C27,56 22,56 22,53 Z"/>
                <!-- Right Engine -->
                <path d="M73,45 C73,42 78,42 78,45 L78,53 C78,56 73,56 73,53 Z"/>
                <!-- Left Tail -->
                <path d="M46,75 L28,85 L28,89 L46,82 Z"/>
                <!-- Right Tail -->
                <path d="M54,75 L72,85 L72,89 L54,82 Z"/>
            </g>
        </svg>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Canvas Starfield & Snow
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let isWarpSpeed = false;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2,
                    speedY: Math.random() * 0.5 + 0.1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    baseSpeed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                if (isWarpSpeed) {
                    // Warp effect: stars move fast down and right
                    p.x += p.speedX * 15;
                    p.y += p.speedY * 15;
                    p.size = Math.min(p.size + 0.1, 4);
                } else {
                    // Normal drift (snow/stars)
                    p.x += p.speedX;
                    p.y += p.speedY;
                }

                // Reset particle if it goes off screen
                if (p.y > height) { p.y = 0; p.x = Math.random() * width; p.size = Math.random()*2; }
                if (p.y < 0) { p.y = height; p.x = Math.random() * width; p.size = Math.random()*2; }
                if (p.x > width) { p.x = 0; p.y = Math.random() * height; p.size = Math.random()*2; }
                if (p.x < 0) { p.x = width; p.y = Math.random() * height; p.size = Math.random()*2; }
            });
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawParticles();

        // Sequence
        function launchSequence() {
            document.getElementById('launchBtn').classList.add('hide');
            
            // Initiate Warp
            isWarpSpeed = true;

            // Launch plane
            setTimeout(() => {
                document.getElementById('plane').classList.add('fly-animation');
            }, 500);

            // Explosive Confetti when plane hits center
            setTimeout(() => {
                isWarpSpeed = false; // Slow down stars
                
                var count = 300;
                var defaults = { origin: { y: 0.7 }, colors: ['#c4d600', '#ffffff', '#aaaaaa'] };

                function fire(particleRatio, opts) {
                    confetti(Object.assign({}, defaults, opts, {
                        particleCount: Math.floor(count * particleRatio)
                    }));
                }

                fire(0.25, { spread: 26, startVelocity: 55 });
                fire(0.2, { spread: 60 });
                fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
                fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
                fire(0.1, { spread: 120, startVelocity: 45 });
                
                // Show message card
                setTimeout(() => {
                    document.getElementById('message').classList.add('show');
                }, 800);

            }, 2000);
        }
    </script>
</body>
</html>
